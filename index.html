<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExploreMore - Főoldal</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/hover.css/2.3.1/css/hover-min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo animate__animated animate__fadeInDown">ExploreMore</div>
      <button class="menu-toggle" id="menu-toggle">&#9776;</button>
      <nav id="nav-menu">
        <a href="index.html" class="hvr-underline-from-left">Főoldal</a>
        <a href="destinations.html" class="hvr-underline-from-left">Úticélok</a>
        <a href="about.html" class="hvr-underline-from-left">Rólunk</a>
      </nav>
    </header>

    <main class="hero">
      <div class="hero-text animate__animated animate__zoomIn">
        <h1>Indulj el az ismeretlenbe!</h1>
        <p>
          Legyen szó hegyekről, tengerpartról vagy városi kalandokról - velünk
          felfedezheted a világot.
        </p>
        <a href="destinations.html" class="cta-button hvr-grow">Fedezd fel!</a>
      </div>
    </main>

    <footer>&copy; 2025 ExploreMore. Minden jog fenntartva.</footer>

    <script>
      const toggleBtn = document.getElementById("menu-toggle");
      const navMenu = document.getElementById("nav-menu");

      toggleBtn.addEventListener("click", () => {
        navMenu.classList.toggle("show");
      });
    </script>
  </body>
</html>
